name: Update Data and Deploy SADP Tracker

on:
  # Run every 6 hours to pick up new SADP records
  schedule:
    - cron: '0 */6 * * *'

  # Run whenever code is pushed to main
  push:
    branches: [ main ]

  # Allow manual triggering from the GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout this repo ──────────────────────────────────────────────
      - name: Checkout SADP-Tracker repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: true
          fetch-depth: 0

      # ── Clone the sadp-pilot data source ───────────────────────────────
      - name: Clone CVEProject/sadp-pilot
        uses: actions/checkout@v6.0.2
        with:
          repository: CVEProject/sadp-pilot
          path: sadp-pilot
          # Public repo – no token needed

      # ── Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Parse SADP records and generate data.json ────────────────────────
      - name: Parse SADP records and generate data.json
        env:
          SADP_REPO_PATH: ${{ github.workspace }}/sadp-pilot
        run: python fetch_data.py

      # ── Build the static site ────────────────────────────────────────────
      - name: Build static site
        run: python build.py --quiet

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        if: github.ref == 'refs/heads/main'
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5.0.0
        if: github.ref == 'refs/heads/main'

      # ── Commit updated data.json back to main ────────────────────────────
      - name: Commit updated data.json
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: update SADP data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
